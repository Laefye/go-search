services:
  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
  rabbitmq:
    image: rabbitmq:4.3.0-management
    container_name: rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: server
    environment:
      PORT: 8080
      RABBITMQ_URL: ${RABBITMQ_URL}
      REDIS_ADDR: ${REDIS_ADDR}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: ${REDIS_DB}
    container_name: server
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "${PORT}:8080"
  listener:
    build:
      context: .
      dockerfile: Dockerfile
      target: listener
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL}
      REDIS_ADDR: ${REDIS_ADDR}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: ${REDIS_DB}
    container_name: listener
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
  cleaner:
    build:
      context: .
      dockerfile: Dockerfile
      target: cleaner
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL}
      REDIS_ADDR: ${REDIS_ADDR}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: ${REDIS_DB}
    container_name: cleaner
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy